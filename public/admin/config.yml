# Decap CMS configuration — Sunshine Tiny Houses
# OAuth backend is a Cloudflare Worker (see CLAUDE.md for setup)
backend:
  name: github
  repo: MayHem777/STH-Website
  branch: main
  base_url: https://sth-oauth.mitchjcroft.workers.dev

site_url: https://sth-website.pages.dev
display_url: https://sth-website.pages.dev

media_folder: public/assets/uploads
public_folder: /assets/uploads

# Show preview link in editor (requires Cloudflare Pages preview URL or live site)
publish_mode: editorial_workflow

collections:

  # ─── THOW Products ──────────────────────────────────────────────
  - name: products-thow
    label: "THOW Models"
    label_singular: "THOW Model"
    folder: src/content/products-thow
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Tagline", name: tagline, widget: string, required: false }
      - { label: "Description (SEO)", name: description, widget: text }
      - { label: "Published", name: draft, widget: boolean, default: true, hint: "Turn ON to publish. Turn OFF to hide from site." }
      - { label: "Sort Order", name: order, widget: number, default: 99 }
      - { label: "Hero Image", name: heroImage, widget: image, required: false }
      - { label: "Hero Image Alt Text", name: heroImageAlt, widget: string, required: false }
      - { label: "Badge (e.g. Most Popular)", name: badge, widget: string, required: false }
      - label: "Specifications"
        name: specs
        widget: object
        required: false
        fields:
          - { label: "Length", name: Length, widget: string, required: false }
          - { label: "Class", name: Class, widget: string, required: false }
          - { label: "Registration", name: Registration, widget: string, required: false }
      - label: "Features (bullet list)"
        name: features
        widget: list
        required: false
        field: { label: Feature, name: feature, widget: string }
      - { label: "Page Body", name: body, widget: markdown }

  # ─── Modular Products ───────────────────────────────────────────
  - name: products-modular
    label: "Modular Models"
    label_singular: "Modular Model"
    folder: src/content/products-modular
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Tagline", name: tagline, widget: string, required: false }
      - { label: "Description (SEO)", name: description, widget: text }
      - { label: "Published", name: draft, widget: boolean, default: true, hint: "Turn ON to publish. Turn OFF to hide from site." }
      - { label: "Sort Order", name: order, widget: number, default: 99 }
      - { label: "Hero Image", name: heroImage, widget: image, required: false }
      - { label: "Hero Image Alt Text", name: heroImageAlt, widget: string, required: false }
      - label: "Specifications"
        name: specs
        widget: object
        required: false
        fields:
          - { label: "Class", name: Class, widget: string, required: false }
          - { label: "Builder Licence", name: Builder, widget: string, required: false }
      - { label: "Page Body", name: body, widget: markdown }

  # ─── Class 10a Products ─────────────────────────────────────────
  - name: products-class10a
    label: "Backyard Studios"
    label_singular: "Backyard Studio"
    folder: src/content/products-class10a
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Tagline", name: tagline, widget: string, required: false }
      - { label: "Description (SEO)", name: description, widget: text }
      - { label: "Published", name: draft, widget: boolean, default: true, hint: "Turn ON to publish. Turn OFF to hide from site." }
      - { label: "Sort Order", name: order, widget: number, default: 99 }
      - { label: "Hero Image", name: heroImage, widget: image, required: false }
      - { label: "Hero Image Alt Text", name: heroImageAlt, widget: string, required: false }
      - { label: "Page Body", name: body, widget: markdown }

  # ─── Blog ────────────────────────────────────────────────────────
  - name: blog
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Description (SEO)", name: description, widget: text }
      - { label: "Publish Date", name: publishDate, widget: datetime }
      - { label: "Draft (unpublished)", name: draft, widget: boolean, default: true, hint: "Uncheck to publish." }
      - { label: "Author", name: author, widget: string, default: "Sunshine Tiny Houses" }
      - { label: "Hero Image", name: heroImage, widget: image, required: false }
      - { label: "Hero Image Alt Text", name: heroImageAlt, widget: string, required: false }
      - label: "Tags"
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - { label: "Body", name: body, widget: markdown }

  # ─── Static Pages ────────────────────────────────────────────────
  - name: pages
    label: "Pages"
    label_singular: "Page"
    folder: src/content/pages
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Description (SEO)", name: description, widget: text }
      - { label: "Published", name: draft, widget: boolean, default: true, hint: "Turn ON to publish. Turn OFF to hide." }
      - { label: "Body", name: body, widget: markdown }
